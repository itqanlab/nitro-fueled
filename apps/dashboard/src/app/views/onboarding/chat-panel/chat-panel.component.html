<div class="chat-panel">
  <div class="chat-header">
    <div class="chat-header-icon">🤖</div>
    <div class="chat-header-info">
      <div class="chat-header-title">Chat with AI Analyst</div>
      <div class="chat-header-status">
        <span class="chat-header-status-dot"></span>
        Online
      </div>
    </div>
  </div>

  <div class="chat-messages">
    @for (msg of messages(); track $index) {
      <div class="chat-msg" [ngClass]="msg.sender">
        <div class="chat-msg-avatar">
          @if (msg.sender === 'ai') { AI } @else { You }
        </div>
        <div class="chat-msg-body">
          <div class="chat-msg-label">
            @if (msg.sender === 'ai') { AI Analyst } @else { You }
          </div>
          <div class="chat-msg-bubble" [innerHTML]="msg.text"></div>
          <div class="chat-msg-time">{{ msg.time }}</div>
        </div>
      </div>
    }
  </div>

  <div class="chat-input-area">
    <div class="chat-input-row">
      <input
        class="chat-input"
        type="text"
        placeholder="Ask about recommendations, request changes..."
        [(ngModel)]="inputValue"
        (keydown)="onKeydown($event)"
      >
      <button class="chat-send-btn" (click)="send()">Send →</button>
    </div>
    <div class="chat-input-hint">AI can modify teams, workflows, and settings based on your feedback</div>
  </div>
</div>
