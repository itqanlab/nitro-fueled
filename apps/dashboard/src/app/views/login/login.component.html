<div class="login-wrapper">
  <nz-card class="login-card">
    <div class="login-header">
      <h1 class="login-title">Nitro Fueled Dashboard</h1>
      <p class="login-subtitle">Enter your API key to continue</p>
    </div>

    <nz-form-item>
      <nz-form-label [nzSpan]="24" nzFor="apiKey">API Key</nz-form-label>
      <nz-form-control [nzSpan]="24">
        <nz-input-group [nzSuffix]="suffixTemplate">
          <input
            nz-input
            id="apiKey"
            type="password"
            placeholder="Enter your API key"
            [(ngModel)]="apiKeyInput"
            (keyup.enter)="onConnect()"
            aria-label="API Key"
          />
        </nz-input-group>
        <ng-template #suffixTemplate></ng-template>
      </nz-form-control>
    </nz-form-item>

    @if (errorMessage()) {
      <nz-alert
        nzType="error"
        [nzMessage]="errorMessage()!"
        nzShowIcon
        class="login-error"
      ></nz-alert>
    }

    <button
      nz-button
      nzType="primary"
      nzBlock
      [nzLoading]="loading()"
      (click)="onConnect()"
      class="login-button"
    >
      Connect
    </button>
  </nz-card>
</div>
