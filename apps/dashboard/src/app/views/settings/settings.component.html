<div class="settings-shell">
  <div class="settings-header">
    <h1 class="settings-title">Settings</h1>
    <p class="settings-subtitle">Manage API keys, launchers, subscriptions, and model mappings</p>
  </div>

  <app-tab-nav [tabs]="tabs" [activeTab]="activeTab()" (tabChange)="selectTab($event)"></app-tab-nav>

  <div class="settings-content">
    @switch (activeTab()) {
      @case ('api-keys') {
        <app-api-keys></app-api-keys>
      }
      @case ('launchers') {
        <app-launchers></app-launchers>
      }
      @case ('subscriptions') {
        <app-subscriptions></app-subscriptions>
      }
      @case ('mapping') {
        <app-mapping></app-mapping>
      }
    }
  </div>
</div>
