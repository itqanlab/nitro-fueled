<div class="settings-shell">
  <div class="settings-header">
    <h1 class="settings-title">Settings</h1>
    <p class="settings-subtitle">Manage API keys, launchers, subscriptions, and model mappings</p>
  </div>

  <nav class="settings-tabs">
    @for (tab of tabs; track tab.id) {
      <button
        class="settings-tab"
        [ngClass]="{ 'active': activeTab() === tab.id }"
        (click)="selectTab(tab.id)">
        <span class="tab-icon">{{ tab.icon }}</span>
        <span class="tab-label">{{ tab.label }}</span>
      </button>
    }
  </nav>

  <div class="settings-content">
    @switch (activeTab()) {
      @case ('api-keys') {
        <app-api-keys></app-api-keys>
      }
      @case ('launchers') {
        <app-launchers></app-launchers>
      }
      @case ('subscriptions') {
        <app-subscriptions></app-subscriptions>
      }
      @case ('mapping') {
        <app-mapping></app-mapping>
      }
    }
  </div>
</div>
